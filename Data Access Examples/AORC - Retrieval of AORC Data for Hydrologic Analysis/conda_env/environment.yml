name: aorc
channels:
  - conda-forge
dependencies:
  - python=3.10
  - geopandas=1.1.1
  - matplotlib=3.10.3
  - xarray=2025.6.1
  - rioxarray=0.19.0
  - s3fs=2025.7.0
  - contextily=1.6.2
  - zarr=2.17.2
  - exactextract=0.2.0
  - dask=2025.7.0
  - ipykernel=6.29 # we need this to create a new aorc kernel
  - pip  # Optional, useful for installing additional pip-only packages